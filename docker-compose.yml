services:
  postgres:
    image: postgres:17-alpine
    container_name: ai_ads_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ai_ads_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ai_ads_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ai_ads_backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/ai_ads_db
      REDIS_URL: redis://redis:6379/0
      DB_HOST: postgres
      DB_PORT: "5432"
    expose:
      - "8000"
    ports:
      - "8001:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ai_ads_frontend
    restart: unless-stopped
    ports:
      - "8002:80"

  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ai_ads_celery_worker
    restart: unless-stopped
    command: celery -A app.tasks.celery_app worker -l info
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/ai_ads_db
      REDIS_URL: redis://redis:6379/0
      DB_HOST: postgres
      DB_PORT: "5432"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  pgdata:
  redis_data:
